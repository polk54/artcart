<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtCart — What are you making?</title>
  <meta name="description" content="ArtCart is a calm, inventory-first tracker for your craft projects. Now on the App Store for iPhone." />
  <meta name="theme-color" content="#2370C6" />
  <!-- App icon favicon (blue dresser) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="favicon-180.png" />

  <!-- Social sharing -->
  <meta property="og:title" content="ArtCart — What are you making?" />
  <meta property="og:description" content="A calm home for the craft projects you're making. Now on the App Store for iPhone." />
  <meta property="og:image" content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="og-image.png" />

  <!-- Brand font (same family bundled in the app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F4F4F2;
      --ink: #1F1E1D;
      --ink-soft: #8A8A8E;
      --accent: #2370C6;
      --line: #E6E5E3;
      --dot: rgba(138, 138, 142, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background-color: var(--bg);
      /* dotted-notebook grid, matching the app */
      background-image: radial-gradient(var(--dot) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      background-position: center;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 640px;
    }

    .logo {
      width: min(72vw, 440px);
      height: auto;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(30px, 7vw, 56px);
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .tagline {
      font-weight: 500;
      font-size: clamp(15px, 3.6vw, 19px);
      color: var(--ink-soft);
      max-width: 30ch;
      line-height: 1.5;
    }

    .appstore {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      font-weight: 600;
      font-size: clamp(15px, 3.6vw, 17px);
      color: #fff;
      background: var(--ink);
      padding: 14px 26px;
      border-radius: 14px;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .appstore:hover { background: #000; transform: translateY(-1px); }
    .appstore:active { transform: translateY(0); }

    .appstore svg {
      width: 26px;
      height: 26px;
      fill: #fff;
      flex-shrink: 0;
    }

    .appstore .label { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .appstore .label small { font-weight: 500; font-size: 0.72em; opacity: 0.85; }

    footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      font-size: 12.5px;
      color: var(--ink-soft);
    }

    .topnav {
      position: fixed;
      top: 20px;
      right: 22px;
      display: flex;
      gap: 22px;
      z-index: 10;
    }
    .topnav a {
      text-decoration: none;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 14px;
    }
    .topnav a:hover { color: var(--accent); }

    @media (prefers-color-scheme: dark) {
      /* keep it light/brand for now — the app's dark mode is a later pass */
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="faq/">FAQ</a>
    <a href="privacy/">Privacy</a>
  </nav>

  <main class="wrap">
    <img class="logo" src="artcart-logo.png" alt="ArtCart" />
    <h1>What are you making?</h1>
    <a class="appstore" href="https://apps.apple.com/us/app/artcart-craft-catalog/id6788201751" aria-label="Download ArtCart on the App Store">
      <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      <span class="label"><small>Download on the</small>App Store</span>
    </a>
  </main>

  <footer>ArtCart · 2026</footer>
</body>
</html>
