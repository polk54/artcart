<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtCart — What are you making?</title>
  <meta name="description" content="ArtCart is a calm, inventory-first tracker for your craft projects. iOS app coming soon." />
  <meta name="theme-color" content="#2370C6" />
  <!-- App icon favicon (blue dresser) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="favicon-180.png" />

  <!-- Social sharing -->
  <meta property="og:title" content="ArtCart — What are you making?" />
  <meta property="og:description" content="A calm home for the craft projects you're making. iOS app coming soon." />
  <meta property="og:image" content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="og-image.png" />

  <!-- Brand font (same family bundled in the app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F4F4F2;
      --ink: #1F1E1D;
      --ink-soft: #8A8A8E;
      --accent: #2370C6;
      --line: #E6E5E3;
      --dot: rgba(138, 138, 142, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background-color: var(--bg);
      /* dotted-notebook grid, matching the app */
      background-image: radial-gradient(var(--dot) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      background-position: center;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 640px;
    }

    .logo {
      width: min(72vw, 440px);
      height: auto;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(30px, 7vw, 56px);
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .tagline {
      font-weight: 500;
      font-size: clamp(15px, 3.6vw, 19px);
      color: var(--ink-soft);
      max-width: 30ch;
      line-height: 1.5;
    }

    .pill {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: clamp(13px, 3.4vw, 15px);
      color: var(--accent);
      background: rgba(35, 112, 198, 0.10);
      border: 1px solid rgba(35, 112, 198, 0.22);
      padding: 9px 16px;
      border-radius: 999px;
    }

    .pill .dot {
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--accent);
    }

    footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      font-size: 12.5px;
      color: var(--ink-soft);
    }

    .topnav {
      position: fixed;
      top: 20px;
      right: 22px;
      display: flex;
      gap: 22px;
      z-index: 10;
    }
    .topnav a {
      text-decoration: none;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 14px;
    }
    .topnav a:hover { color: var(--accent); }

    @media (prefers-color-scheme: dark) {
      /* keep it light/brand for now — the app's dark mode is a later pass */
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="faq/">FAQ</a>
    <a href="privacy/">Privacy</a>
  </nav>

  <main class="wrap">
    <img class="logo" src="artcart-logo.png" alt="ArtCart" />
    <h1>What are you making?</h1>
    <span class="pill"><span class="dot"></span> iOS app · coming soon</span>
  </main>

  <footer>ArtCart · 2026</footer>
</body>
</html>
